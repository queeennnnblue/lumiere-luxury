<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حساب الأسعار | LeMore Pricing Calculator</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d4af37;
            --bg-color: #f9f9f9;
            --border-color: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--primary-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            padding-top: 100px;
        }
        
        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        
        .lang-btn {
            padding: 8px 16px;
            border: 2px solid var(--accent-color);
            background: white;
            color: var(--primary-color);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .lang-btn.active {
            background: var(--accent-color);
            color: white;
        }
        
        .lang-btn:hover {
            transform: translateY(-2px);
        }
        
        .currency-switcher {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        
        .curr-btn {
            padding: 8px 16px;
            border: 2px solid var(--accent-color);
            background: white;
            color: var(--primary-color);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .curr-btn.active {
            background: var(--accent-color);
            color: white;
        }
        
        .curr-btn:hover {
            transform: translateY(-2px);
        }
        
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 1200px;
            width: 100%;
        }
        
        .header-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h2 {
            font-size: 2.2em;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        .subtitle {
            color: var(--accent-color);
            font-size: 0.95em;
            margin-bottom: 20px;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .section {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .section h3 {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95em;
            font-weight: 600;
            color: var(--primary-color);
        }
        
        input[type="number"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }
        
        .sub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .products-list {
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .product-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .product-cost {
            font-size: 0.9em;
            color: var(--muted);
        }
        
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }
        
        .add-product-group {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .add-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #c9a55c 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
        }
        
        button.calc-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #1a252f 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.15em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        button.calc-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        button.calc-btn:active {
            transform: translateY(-1px);
        }
        
        .results {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #1a252f 100%);
            color: white;
            border-radius: 10px;
            display: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            animation: slideInDown 0.4s ease;
        }
        
        .results.show {
            display: block;
        }
        
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .result-card {
            background: rgba(255,255,255,0.1);
            padding: 18px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }
        
        .result-card h4 {
            color: var(--accent-color);
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        
        .result-value {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
        }
        
        .final-price {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--accent-color) 0%, #c9a55c 100%);
            color: var(--primary-color);
            padding: 25px;
            border-radius: 8px;
            text-align: center;
        }
        
        .final-price h3 {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        .final-price-value {
            font-size: 2.2em;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .muted {
            color: #999;
        }
        
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h2 {
                font-size: 1.6em;
            }
            
            .language-switcher {
                right: 10px;
                top: 10px;
                gap: 5px;
            }
            
            .currency-switcher {
                left: 10px;
                top: 10px;
                gap: 5px;
            }
            
            .lang-btn, .curr-btn {
                padding: 6px 12px;
                font-size: 0.9em;
            }

            .add-product-group {
                grid-template-columns: 1fr;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="language-switcher">
    <button class="lang-btn active" onclick="switchLanguage('ar')">العربية</button>
    <button class="lang-btn" onclick="switchLanguage('en')">English</button>
</div>

<div class="currency-switcher">
    <button class="curr-btn active" onclick="switchCurrency('SAR')">ر.س</button>
    <button class="curr-btn" onclick="switchCurrency('USD')">$</button>
</div>

<div class="container">
    <div class="header-container">
        <h2 id="title">آلة حساب الأسعار - 10 قطع</h2>
        <p class="subtitle" id="subtitle">أضف حتى 10 منتجات مختلفة وسيتم توزيع النفقات عليها</p>
    </div>

    <div class="main-grid">
        <!-- Settings Section -->
        <div class="section">
            <h3 id="sec2">النفقات العامة</h3>
            <div class="form-group">
                <label for="fixedCosts" id="label4">إجمالي النفقات الثابتة</label>
                <input type="number" id="fixedCosts" value="2112" step="1">
            </div>
            <div class="form-group">
                <label for="monthlyCosts" id="label5">إجمالي النفقات الشهرية</label>
                <input type="number" id="monthlyCosts" value="1200" step="1">
            </div>
            <div class="sub-grid">
                <div class="form-group">
                    <label for="paymentFee" id="label6">رسوم الدفع (%)</label>
                    <input type="number" id="paymentFee" value="3.8" step="0.1">
                </div>
                <div class="form-group">
                    <label for="processingFee" id="label7">رسوم المعالجة (%)</label>
                    <input type="number" id="processingFee" value="6.0" step="0.1">
                </div>
            </div>
            <div class="form-group">
                <label for="profitMargin" id="label8">هامش الربح المستهدف (%)</label>
                <input type="number" id="profitMargin" value="6.0" step="0.1">
            </div>
        </div>

        <!-- Products Section -->
        <div class="section">
            <h3 id="sec1">المنتجات (10 قطع كحد أقصى)</h3>
            
            <div class="add-product-group">
                <input type="text" id="productName" placeholder="اسم المنتج" id="label1">
                <input type="number" id="productCost" placeholder="سعر القطعة" step="0.01" id="label2">
                <button class="add-btn" onclick="addProduct()" id="addBtn">إضافة</button>
            </div>

            <div class="products-list" id="productsList">
                <p class="muted" id="noProducts">لم تضف أي منتجات بعد</p>
            </div>
        </div>
    </div>

    <button class="calc-btn" onclick="calculatePrice()" id="calcBtn">احسب الأسعار النهائية</button>

    <div class="error-message" id="errorMsg"></div>

    <div class="results" id="resultsArea">
        <h3 id="resultsTitle">نتائج الحساب</h3>
        <div class="results-grid" id="resultsGrid"></div>
    </div>
</div>

<script>
    let currentLanguage = 'ar';
    let currentCurrency = 'SAR';
    let products = [];

    const translations = {
        ar: {
            title: 'آلة حساب الأسعار - 10 قطع',
            subtitle: 'أضف حتى 10 منتجات مختلفة وسيتم توزيع النفقات عليها',
            sec1: 'المنتجات (10 قطع كحد أقصى)',
            sec2: 'النفقات العامة',
            label1: 'اسم المنتج',
            label2: 'سعر القطعة',
            label3: 'تكاليف الشحن لكل منتج',
            label4: 'إجمالي النفقات الثابتة',
            label5: 'إجمالي النفقات الشهرية',
            label6: 'رسوم الدفع (%)',
            label7: 'رسوم المعالجة (%)',
            label8: 'هامش الربح المستهدف (%)',
            addBtn: 'إضافة',
            calcBtn: 'احسب الأسعار النهائية',
            noProducts: 'لم تضف أي منتجات بعد',
            resultsTitle: 'نتائج الحساب',
            costLabel: 'السعر الأساسي:',
            overheadLabel: 'النفقات الموزعة:',
            finalLabel: 'السعر النهائي:',
            error: 'خطأ: مجموع النسب المئوية لا يمكن أن يكون 100% أو أكثر',
            errorNoProducts: 'يجب إضافة منتج واحد على الأقل',
            maxProducts: 'لا يمكن إضافة أكثر من 10 منتجات'
        },
        en: {
            title: 'LeMore Pricing Calculator - 10 Products',
            subtitle: 'Add up to 10 different products and costs will be distributed evenly',
            sec1: 'Products (Max 10 items)',
            sec2: 'Overhead & Settings',
            label1: 'Product Name',
            label2: 'Base Cost per Piece',
            label3: 'Shipping per Product',
            label4: 'Total Fixed Costs',
            label5: 'Total Monthly Costs',
            label6: 'Payment Fee (%)',
            label7: 'Processing Fee (%)',
            label8: 'Target Profit (%)',
            addBtn: 'Add',
            calcBtn: 'Calculate Final Prices',
            noProducts: 'No products added yet',
            resultsTitle: 'Calculation Results',
            costLabel: 'Base Price:',
            overheadLabel: 'Distributed Overhead:',
            finalLabel: 'Final Price:',
            error: 'Error: The sum of percentage fees and profit cannot be 100% or greater',
            errorNoProducts: 'You must add at least one product',
            maxProducts: 'Maximum 10 products allowed'
        }
    };

    function switchLanguage(lang) {
        currentLanguage = lang;
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        
        document.getElementById('title').textContent = translations[lang].title;
        document.getElementById('subtitle').textContent = translations[lang].subtitle;
        document.getElementById('sec1').textContent = translations[lang].sec1;
        document.getElementById('sec2').textContent = translations[lang].sec2;
        document.getElementById('productName').placeholder = translations[lang].label1;
        document.getElementById('productCost').placeholder = translations[lang].label2;
        document.getElementById('label4').textContent = translations[lang].label4;
        document.getElementById('label5').textContent = translations[lang].label5;
        document.getElementById('label6').textContent = translations[lang].label6;
        document.getElementById('label7').textContent = translations[lang].label7;
        document.getElementById('label8').textContent = translations[lang].label8;
        document.getElementById('addBtn').textContent = translations[lang].addBtn;
        document.getElementById('calcBtn').textContent = translations[lang].calcBtn;
        
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        updateProductsList();
    }

    function switchCurrency(currency) {
        currentCurrency = currency;
        document.querySelectorAll('.curr-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function formatCurrency(value) {
        if (currentCurrency === 'SAR') {
            return value.toFixed(2) + ' ر.س';
        } else {
            return '$' + value.toFixed(2);
        }
    }

    function addProduct() {
        const name = document.getElementById('productName').value.trim();
        const cost = parseFloat(document.getElementById('productCost').value) || 0;

        if (!name) {
            showError(translations[currentLanguage].errorNoProducts);
            return;
        }

        if (products.length >= 10) {
            showError(translations[currentLanguage].maxProducts);
            return;
        }

        products.push({ id: Date.now(), name, cost });
        document.getElementById('productName').value = '';
        document.getElementById('productCost').value = '';
        updateProductsList();
    }

    function deleteProduct(id) {
        products = products.filter(p => p.id !== id);
        updateProductsList();
    }

    function updateProductsList() {
        const list = document.getElementById('productsList');
        
        if (products.length === 0) {
            list.innerHTML = `<p class="muted">${translations[currentLanguage].noProducts}</p>`;
            return;
        }

        list.innerHTML = products.map(product => `
            <div class="product-item">
                <div class="product-info">
                    <div class="product-name">${product.name}</div>
                    <div class="product-cost">${formatCurrency(product.cost)}</div>
                </div>
                <button class="delete-btn" onclick="deleteProduct(${product.id})">حذف</button>
            </div>
        `).join('');
    }

    function showError(message) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
    }

    function calculatePrice() {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.style.display = 'none';

        if (products.length === 0) {
            showError(translations[currentLanguage].errorNoProducts);
            return;
        }

        const fixedCosts = parseFloat(document.getElementById('fixedCosts').value) || 0;
        const monthlyCosts = parseFloat(document.getElementById('monthlyCosts').value) || 0;
        const paymentFee = parseFloat(document.getElementById('paymentFee').value) || 0;
        const processingFee = parseFloat(document.getElementById('processingFee').value) || 0;
        const profitMargin = parseFloat(document.getElementById('profitMargin').value) || 0;

        const totalPercentageDeduction = (paymentFee + processingFee + profitMargin) / 100;

        if (totalPercentageDeduction >= 1) {
            showError(translations[currentLanguage].error);
            return;
        }

        // Distribute overhead equally among all products
        const totalOverhead = fixedCosts + monthlyCosts;
        const overheadPerProduct = totalOverhead / products.length;

        // Calculate final prices
        const results = products.map(product => {
            const baseCost = product.cost;
            const totalUnitCost = baseCost + overheadPerProduct;
            const finalPrice = totalUnitCost / (1 - totalPercentageDeduction);
            
            return {
                name: product.name,
                baseCost,
                overhead: overheadPerProduct,
                totalCost: totalUnitCost,
                finalPrice
            };
        });

        displayResults(results);
    }

    function displayResults(results) {
        const grid = document.getElementById('resultsGrid');
        const t = translations[currentLanguage];

        const resultsHTML = results.map(result => `
            <div class="result-card">
                <h4>${result.name}</h4>
                <p><small>${t.costLabel}</small><br><strong>${formatCurrency(result.baseCost)}</strong></p>
                <p><small>${t.overheadLabel}</small><br><strong>${formatCurrency(result.overhead)}</strong></p>
            </div>
        `).join('') + `
            <div class="final-price">
                <h3>${t.resultsTitle}</h3>
                ${results.map(result => `
                    <div style="margin: 10px 0;">
                        <strong>${result.name}:</strong> <span class="final-price-value">${formatCurrency(result.finalPrice)}</span>
                    </div>
                `).join('')}
            </div>
        `;

        grid.innerHTML = resultsHTML;
        document.getElementById('resultsArea').classList.add('show');
    }

    // Allow Enter key to add product
    document.getElementById('productCost').addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            addProduct();
        }
    });

    document.getElementById('productName').addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            addProduct();
        }
    });
</script>

</body>
</html>

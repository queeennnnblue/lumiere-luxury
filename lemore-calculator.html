<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeMore Pricing Calculator</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d4af37; /* Subtle gold accent */
            --bg-color: #f9f9f9;
            --border-color: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 800px;
            width: 100%;
        }
        h2 {
            text-align: center;
            font-weight: 400;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: inline-block;
        }
        .header-container {
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .section {
            background: #fdfdfd;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }
        .section h3 {
            font-size: 1.1em;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--accent-color);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            font-weight: 600;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        .results {
            margin-top: 30px;
            padding: 20px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 6px;
        }
        .results p {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            font-size: 1.05em;
        }
        .final-price {
            font-size: 1.4em !important;
            font-weight: bold;
            color: var(--accent-color);
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
            margin-top: 15px !important;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <h2>LeMore Pricing Calculator</h2>
    </div>

    <div class="grid">
        <div class="section">
            <h3>Product Specifics</h3>
            <div class="form-group">
                <label for="baseCost">Base Cost per Piece (SAR)</label>
                <input type="number" id="baseCost" placeholder="e.g., 500" step="0.01">
            </div>
            <div class="form-group">
                <label for="units">Expected Sales Volume (Units)</label>
                <input type="number" id="units" value="50" min="1">
            </div>
            <div class="form-group">
                <label for="shipping">Shipping per Product (SAR)</label>
                <input type="number" id="shipping" value="6.56" step="0.01">
            </div>
        </div>

        <div class="section">
            <h3>Overhead & Settings</h3>
            <div class="form-group">
                <label for="fixedCosts">Total Fixed Costs (SAR)</label>
                <input type="number" id="fixedCosts" value="2112" step="1">
            </div>
            <div class="form-group">
                <label for="monthlyCosts">Total Monthly Costs (SAR)</label>
                <input type="number" id="monthlyCosts" value="1200" step="1">
            </div>
            <div class="grid" style="gap: 10px;">
                <div class="form-group">
                    <label for="paymentFee">Payment (%)</label>
                    <input type="number" id="paymentFee" value="3.8" step="0.1">
                </div>
                <div class="form-group">
                    <label for="processingFee">Processing (%)</label>
                    <input type="number" id="processingFee" value="6.0" step="0.1">
                </div>
                <div class="form-group">
                    <label for="profitMargin">Target Profit (%)</label>
                    <input type="number" id="profitMargin" value="6.0" step="0.1">
                </div>
            </div>
        </div>
    </div>

    <button onclick="calculatePrice()">Calculate Final Price</button>

    <div class="results" id="resultsArea" style="display: none;">
        <p><span>Base Cost + Shipping:</span> <span id="resBase">0 SAR</span></p>
        <p><span>Apportioned Overhead (per unit):</span> <span id="resOverhead">0 SAR</span></p>
        <p><span>Total Unit Cost (Break-even):</span> <span id="resTotalCost">0 SAR</span></p>
        <p class="final-price"><span>Final Selling Price:</span> <span id="resFinalPrice">0 SAR</span></p>
    </div>
</div>

<script>
    function calculatePrice() {
        // Retrieve values
        const baseCost = parseFloat(document.getElementById('baseCost').value) || 0;
        const units = parseFloat(document.getElementById('units').value) || 1;
        const shipping = parseFloat(document.getElementById('shipping').value) || 0;
        
        const fixedCosts = parseFloat(document.getElementById('fixedCosts').value) || 0;
        const monthlyCosts = parseFloat(document.getElementById('monthlyCosts').value) || 0;
        
        const paymentFee = parseFloat(document.getElementById('paymentFee').value) || 0;
        const processingFee = parseFloat(document.getElementById('processingFee').value) || 0;
        const profitMargin = parseFloat(document.getElementById('profitMargin').value) || 0;

        // Calculations
        const overheadPerUnit = (fixedCosts + monthlyCosts) / units;
        const totalUnitCost = baseCost + shipping + overheadPerUnit;
        
        const totalPercentageDeduction = (paymentFee + processingFee + profitMargin) / 100;

        if (totalPercentageDeduction >= 1) {
            alert("Error: The sum of percentage fees and profit cannot be 100% or greater.");
            return;
        }

        const finalPrice = totalUnitCost / (1 - totalPercentageDeduction);

        // Populate Results
        document.getElementById('resBase').innerText = (baseCost + shipping).toFixed(2) + ' SAR';
        document.getElementById('resOverhead').innerText = overheadPerUnit.toFixed(2) + ' SAR';
        document.getElementById('resTotalCost').innerText = totalUnitCost.toFixed(2) + ' SAR';
        document.getElementById('resFinalPrice').innerText = finalPrice.toFixed(2) + ' SAR';

        // Display the results block
        document.getElementById('resultsArea').style.display = 'block';
    }
</script>

</body>
</html>
